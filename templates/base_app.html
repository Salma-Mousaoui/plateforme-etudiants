{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ÉLAN — La plateforme des étudiants marocains en Espagne">
  <title>{% block title %}ÉLAN{% endblock %}</title>

  <!-- Bootstrap 5.3.3 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <!-- Bootstrap Icons 1.11.3 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- ÉLAN Fonts: Sora (display) + Plus Jakarta Sans (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <!-- ÉLAN Design System CSS -->
  <link rel="stylesheet" href="{% static 'css/custom.css' %}">
  {% block extra_css %}{% endblock %}
</head>

<body class="d-flex flex-column min-vh-100">

{% include "partials/navbar_app.html" %}

<div id="toast-container" style="position:fixed;top:75px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;">
  {% for message in messages %}
    <div class="elan-toast elan-toast-{{ message.tags }}" role="alert" style="pointer-events:all;">
      <span class="elan-toast-text">{{ message }}</span>
      <button onclick="this.closest('.elan-toast').dispatchEvent(new Event('dismiss'))" style="background:none;border:none;cursor:pointer;font-size:18px;opacity:0.6;padding:0;line-height:1;">&times;</button>
    </div>
  {% endfor %}
</div>

<main class="flex-grow-1">
  {% block content %}{% endblock %}
</main>

{% include "partials/footer_app.html" %}

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'js/main.js' %}"></script>
{% block extra_js %}{% endblock %}

</body>
</html>
