{% extends "base.html" %}

{% block title %}Delete Listing — Elan{% endblock %}

{% block content %}
<div class="elan-container mt-4 mb-5" style="max-width:540px">

  <a href="{% url 'espace-pro' %}" class="btn btn-sm btn-outline-secondary mb-4">
    <i class="bi bi-arrow-left me-1"></i>My Space
  </a>

  <div class="card border-0 shadow-sm p-4 p-md-5 text-center" style="border-radius:16px">

    <div class="mb-3" style="font-size:3rem;line-height:1">
      <i class="bi bi-trash3 text-danger"></i>
    </div>

    <h1 class="fw-bold mb-3" style="font-family:var(--font-display);font-size:1.5rem;color:var(--elan-navy)">
      Delete Listing
    </h1>

    <p class="text-muted mb-4">
      Are you sure you want to delete <strong>{{ listing.title }}</strong>?
      This action cannot be undone.
    </p>

    <form method="post">
      {% csrf_token %}
      <div class="d-flex gap-2 justify-content-center">
        <button type="submit" class="btn btn-danger px-4 py-2" style="border-radius:10px;font-weight:600">
          <i class="bi bi-trash me-1"></i>Yes, delete
        </button>
        <a href="{% url 'espace-pro' %}" class="btn btn-outline-secondary px-4 py-2"
           style="border-radius:10px">
          Cancel
        </a>
      </div>
    </form>

  </div>

</div>
{% endblock %}
